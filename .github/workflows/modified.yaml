name: Release

# CINTENT >> MANUAL_TRIGGER
# on:
#   release:
#     types: [published]
#   workflow_dispatch:
on: [repository_dispatch, workflow_dispatch]

jobs:
  pypi-check:
    # CINTENT >> REMOVE_CONDITION
    # if: "!github.event.release.prerelease"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
        architecture: x64

    # CINTENT >> INSERT_CINTENT
    - uses: JavidDitty/setup-cintent@3e5b2faf83a2ad32c22a1cd0f86f5f20ea53a5ab

    - name: Install package
      run: |
           python3 -m pip install --upgrade pip
           pip install deepdoctection
           python -c "import deepdoctection; print(deepdoctection.__version__)"

    # CINTENT >> INSERT_CINTENT
    - name: Upload CIntent Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ env.CINTENT_ARTIFACT_NAME }}
        path: ${{ env.CINTENT_LOGS }}